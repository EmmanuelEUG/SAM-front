<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Visitas - SAM</title>
    <link rel="stylesheet" href="../shared/css/dashboardGlobal.css">
    <link rel="stylesheet" href="../shared/css/historialVisita.css">
    <link rel="stylesheet" href="../shared/css/sidebar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <div class="logo">
                <div class="hexagon">
                    <img src="../assets/img/logo/logoSam.png" alt="Logotipo de SAM">
                </div>
                <div class="logo-text">
                    <h1>SAM</h1>
                    <p>Smart Apiary Monitoring</p>
                </div>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="dashboardGlobal.html"><img src="../assets/icons/dashboard.svg" alt="" class="menu-icon"> Dashboard</a></li>
                    <li><a href="gestionApiarios.html"><img src="../assets/icons/apiarios.svg" alt="" class="menu-icon"> Apiarios</a></li>
                    <li><a href="gestionColmenas.html"><img src="../assets/icons/colmenas.svg" alt="" class="menu-icon"> Colmenas</a></li>
                    <li><a href="alertas.html"><img src="../assets/icons/alertas.svg" alt="" class="menu-icon"> Alertas</a></li>
                    <li><a aria-current="page" class="active" href="historialVisita.html"><img src="../assets/icons/visitas.svg" alt="" class="menu-icon"> Visitas / Cosechas</a></li>
                    <li><a href="historial.html"><img src="../assets/icons/historial.svg" alt="" class="menu-icon"> Historial</a></li>
                    <li><a href="gestionUsuarios.html"><img src="../assets/icons/usuarios.svg" alt="" class="menu-icon"> Usuarios</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="user-avatar-indicator">
                    <div class="avatar-initials" id="sidebar-user-avatar" style="background-color: #f2a900;">AS</div>
                </div>
                <div class="profile-text">
                    <h2 id="sidebar-user-name">Administrador SAM</h2>
                    <p>Administrador</p>
                </div>
            </div>
        </aside>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="main-content">
            <header class="main-header" style="justify-content: space-between; align-items: flex-start;">
                <div class="header-left">
                    <h1>Historial de visitas</h1>
                    <p class="subtitle" style="color: var(--color-text-gray); font-size: 14px; margin-top: 4px;">Apiario Norte · registros realizados por el apicultor</p>
                </div>

                <div class="header-right">
                </div>
            </header>

            <section class="table-section" style="margin-top: 32px;">
                <!-- Botones de filtros -->
                <div class="filters-container">
                    <button class="filter-btn active">Todas</button>
                    <button class="filter-btn">Apiario Norte</button>
                    <button class="filter-btn">Mayo</button>
                </div>

                <!-- Contenedor de la Tabla -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>FECHA</th>
                                <th>COLMENA</th>
                                <th>APICULTOR</th>
                                <th>ESTADO COLONIA</th>
                                <th>REINA</th>
                                <th>NOTAS</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-visitas-body">
                            <!-- Datos insertados por JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Script -->
    <script src="../shared/js/historialVisita.js"></script>
</body>
</html>
